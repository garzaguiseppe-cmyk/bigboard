<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guiseppe Drafts — 2024 NBA Draft Big Board</title>
<style>
  /* ============================================================
     GUISEPPE DRAFTS · BIG BOARD  —  self-contained, no dependencies
     To edit the board, scroll to the PLAYERS list in the script
     section at the bottom. Everything else renders automatically.
     ============================================================ */
  :root{
    --bg:#0d0e12; --panel:#15171e; --panel2:#1b1e27; --line:#2a2e3a;
    --ink:#f2f4f8; --muted:#9aa3b2; --faint:#6b7280;
    --accent:#ff5a1f;      /* basketball orange */
    --accent2:#2f7cff;     /* draft-night blue */
    --mono:ui-monospace,"Cascadia Mono","SFMono-Regular",Consolas,"Liberation Mono",monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5;
    -webkit-font-smoothing:antialiased;background-image:radial-gradient(1200px 600px at 50% -200px,#1a1d27 0%,var(--bg) 60%);}
  a{color:inherit}
  .wrap{max-width:1040px;margin:0 auto;padding:0 20px}

  /* ---- Header ---- */
  header.site{padding:46px 0 26px;text-align:center;border-bottom:1px solid var(--line)}
  .brand{font-family:var(--mono);letter-spacing:.35em;text-transform:uppercase;color:var(--accent);
    font-size:13px;font-weight:700}
  h1.title{font-family:var(--mono);font-weight:800;letter-spacing:.02em;line-height:.98;
    font-size:clamp(34px,7vw,68px);margin:14px 0 6px;text-transform:uppercase}
  .subtitle{color:var(--muted);font-size:15px;letter-spacing:.02em}
  .subtitle b{color:var(--ink)}

  /* ---- Tier band ---- */
  .tier{display:flex;align-items:center;gap:16px;margin:52px 0 22px}
  .tier .bar{height:2px;flex:1;background:linear-gradient(90deg,var(--accent),transparent)}
  .tier .bar.r{background:linear-gradient(270deg,var(--accent),transparent)}
  .tier h2{font-family:var(--mono);font-weight:800;text-transform:uppercase;letter-spacing:.14em;
    font-size:clamp(20px,3.4vw,30px);margin:0;white-space:nowrap;color:var(--ink)}
  .tier h2 span{color:var(--accent)}

  /* ---- Player card ---- */
  .card{display:grid;grid-template-columns:300px 1fr;gap:22px;background:var(--panel);
    border:1px solid var(--line);border-radius:16px;padding:16px;margin:16px 0;
    position:relative;overflow:hidden}
  .card.blank{background:var(--panel2);border-style:dashed}
  .rankchip{position:absolute;top:14px;left:14px;z-index:2;font-family:var(--mono);font-weight:800;
    font-size:18px;background:#000a;backdrop-filter:blur(4px);color:#fff;border:1px solid #ffffff22;
    border-radius:10px;padding:4px 10px;letter-spacing:.02em}

  .hero{margin:0;border-radius:12px;overflow:hidden;background:#0a0b0f;aspect-ratio:4/3;
    display:flex;align-items:center;justify-content:center}
  .hero img{width:100%;height:100%;object-fit:cover;display:block}
  .ph{border:1.5px dashed var(--line);color:var(--faint);border-radius:12px;width:100%;height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;text-align:center;
    font-size:13px;padding:10px}
  .ph .big{font-family:var(--mono);font-size:26px;color:#3b4150}

  .info{min-width:0}
  .name{font-size:clamp(22px,3.2vw,30px);font-weight:800;letter-spacing:-.01em;margin:2px 0 8px;line-height:1.05}
  .name .num{color:var(--accent);font-family:var(--mono)}
  .name .todo{color:var(--faint);font-weight:700}
  .comp{display:inline-block;font-size:13.5px;color:var(--ink);background:#0a0b0f;border:1px solid var(--line);
    border-radius:999px;padding:5px 12px;margin-bottom:12px}
  .comp b{color:var(--accent2);font-weight:700;letter-spacing:.06em;font-size:11px;text-transform:uppercase;margin-right:6px}
  .comp .empty{color:var(--faint)}
  .note{color:var(--muted);font-size:14.5px;margin:0 0 14px;max-width:60ch}

  .clips{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .clip{background:#0a0b0f;border:1px solid var(--line);border-radius:10px;overflow:hidden;
    display:flex;flex-direction:column}
  .clip .frame{aspect-ratio:16/9;background:#000;position:relative}
  .clip .frame iframe,.clip .frame video{position:absolute;inset:0;width:100%;height:100%;border:0}
  .clip.empty .frame{display:flex;align-items:center;justify-content:center;border-bottom:1px dashed var(--line)}
  .clip.empty .frame .plus{font-family:var(--mono);color:#3b4150;font-size:13px}
  .clip .cap{padding:7px 10px;font-size:12px;color:var(--muted);display:flex;gap:6px;align-items:center;min-height:32px}
  .clip .cap .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex:0 0 auto}
  .clip .cap.down .dot{background:#ef4444}
  .clip .cap .empty{color:var(--faint)}

  footer.site{border-top:1px solid var(--line);margin-top:60px;padding:26px 0 60px;text-align:center;
    color:var(--faint);font-size:13px}
  footer.site b{color:var(--muted)}

  @media (max-width:720px){
    .card{grid-template-columns:1fr}
    .hero{aspect-ratio:16/9}
  }
</style>
</head>
<body>
  <header class="site">
    <div class="wrap">
      <div class="brand">Guiseppe Drafts</div>
      <h1 class="title">2024 NBA Draft<br>Big Board</h1>
      <div class="subtitle"><b>Big G's Big Board</b> · Top 30 · comps &amp; film</div>
    </div>
  </header>

  <main class="wrap" id="board"><!-- rendered by script --></main>

  <footer class="site">
    <div class="wrap">Guiseppe Drafts · Big G's Big Board 2024 — <b>a living draft board</b></div>
  </footer>

<script>
/* ================================================================
   HOW TO EDIT  (this is the only part you touch)
   ----------------------------------------------------------------
   • Each player is one object in the PLAYERS list below.
   • REORDER a player  → move its { ... } block up or down.
   • CHANGE a tier      → edit the "tier" text. A new tier heading
                          appears automatically whenever it changes.
   • ADD a photo        → put your image file next to this file (or in
                          an /images folder) and set  photo:"images/castle.jpg"
   • ADD a clip         → paste a YouTube, Vimeo, or .mp4 link into a
                          clip's  url:"..."  . Leave url:"" for an empty slot.
                          "type":"down" makes the caption red (a downside).
   • ADD a player       → copy any { ... } block, change the fields.
   Ranks renumber themselves from top to bottom — you don't set them.
   ================================================================ */

const PLAYERS = [
  // ---------------- TIER 1 ----------------
  { tier:"Tier 1", name:"Stephon Castle", comp:"Josh Hart", photo:"",
    note:"Highlight: Jimmy Butler-esque moves in the paint.",
    clips:[
      {label:"Highlight: Hustle", url:""},
      {label:"Downside: His shot", type:"down", url:""},
      {label:"", url:""},
      {label:"", url:""}
    ]},
  { tier:"Tier 1", name:"Devin Carter", comp:"Jrue Holiday (potential)", photo:"",
    note:"", clips:[{label:"",url:""},{label:"",url:""}] },

  // ---------------- TIER 2 ----------------
  { tier:"Tier 2", name:"Zaccharie Risacher", comp:"Shane Battier / Trevor Ariza", photo:"",
    note:"New-age perimeter player, NBA finisher around the rim.",
    clips:[{label:"",url:""},{label:"",url:""}] },
  { tier:"Tier 2", name:"Cody Williams", comp:"Jalen Rose / Josh Giddey", photo:"",
    note:"", clips:[{label:"",url:""},{label:"",url:""}] },
  { tier:"Tier 2", name:"Alexandre Sarr", comp:"Serge Ibaka", photo:"",
    note:"Highlight: 7'1 DeMar DeRozan — NBA-level finisher off the roll. Highest floor in the class.",
    clips:[{label:"",url:""},{label:"",url:""}] },
  { tier:"Tier 2", name:"Bub Carrington", comp:"D'Angelo Russell", photo:"",
    note:"", clips:[{label:"",url:""},{label:"",url:""}] },

  // ---------------- TIER 3 ----------------
  { tier:"Tier 3", name:"Tidjane Salaun", comp:"Tayshaun Prince", photo:"",
    note:"", clips:[{label:"",url:""},{label:"",url:""}] },

  // ---------------- TIER 4 ----------------
  { tier:"Tier 4", name:"Nikola Topic", comp:"Goran Dragic / Evan Turner", photo:"",
    note:"", clips:[{label:"",url:""},{label:"",url:""}] },
  { tier:"Tier 4", name:"Tristan da Silva", comp:"Chandler Parsons / Rudy Gay", photo:"",
    note:"", clips:[{label:"",url:""},{label:"",url:""}] },
  { tier:"Tier 4", name:"Reed Sheppard", comp:"Mark Price", photo:"",
    note:"", clips:[{label:"",url:""},{label:"",url:""}] },
  { tier:"Tier 4", name:"Enrique Freeman", comp:"Jaime Jaquez Jr", photo:"",
    note:"", clips:[{label:"",url:""},{label:"",url:""}] },
  { tier:"Tier 4", name:"Donovan Clingan", comp:"Jakob Poeltl", photo:"",
    note:"", clips:[{label:"",url:""},{label:"",url:""}] },

  // ---------------- TIER 5 ----------------
  { tier:"Tier 5", name:"Ja'Kobe Walter", comp:"Tim Hardaway Jr", photo:"",
    note:"", clips:[{label:"",url:""},{label:"",url:""}] },
  { tier:"Tier 5", name:"Matas Buzelis", comp:"Rui Hachimura", photo:"",
    note:"", clips:[{label:"",url:""},{label:"",url:""}] },
  { tier:"Tier 5", name:"Ron Holland", comp:"Victor Oladipo", photo:"",
    note:"", clips:[{label:"",url:""},{label:"",url:""}] },
  { tier:"Tier 5", name:"Dalton Knecht", comp:"Tobias Harris", photo:"",
    note:"", clips:[{label:"",url:""},{label:"",url:""}] },
  { tier:"Tier 5", name:"Trey Alexander", comp:"Tyrese Haliburton", photo:"",
    note:"Complete potential pick here — could be out of the league.",
    clips:[{label:"",url:""},{label:"",url:""}] },
  { tier:"Tier 5", name:"Zach Edey", comp:"Ivica Zubac", photo:"",
    note:"", clips:[{label:"",url:""},{label:"",url:""}] },
  { tier:"Tier 5", name:"Rob Dillingham", comp:"Nick Van Exel", photo:"",
    note:"", clips:[{label:"",url:""},{label:"",url:""}] },
  { tier:"Tier 5", name:"Bronny James", comp:"Jose Alvarado", photo:"",
    note:"", clips:[{label:"",url:""},{label:"",url:""}] },

  // ---------------- 21–30 : blank slots to fill ----------------
  { tier:"21–30 · To Slot", name:"", comp:"", photo:"", note:"", clips:[{label:"",url:""},{label:"",url:""}] },
  { tier:"21–30 · To Slot", name:"", comp:"", photo:"", note:"", clips:[{label:"",url:""},{label:"",url:""}] },
  { tier:"21–30 · To Slot", name:"", comp:"", photo:"", note:"", clips:[{label:"",url:""},{label:"",url:""}] },
  { tier:"21–30 · To Slot", name:"", comp:"", photo:"", note:"", clips:[{label:"",url:""},{label:"",url:""}] },
  { tier:"21–30 · To Slot", name:"", comp:"", photo:"", note:"", clips:[{label:"",url:""},{label:"",url:""}] },
  { tier:"21–30 · To Slot", name:"", comp:"", photo:"", note:"", clips:[{label:"",url:""},{label:"",url:""}] },
  { tier:"21–30 · To Slot", name:"", comp:"", photo:"", note:"", clips:[{label:"",url:""},{label:"",url:""}] },
  { tier:"21–30 · To Slot", name:"", comp:"", photo:"", note:"", clips:[{label:"",url:""},{label:"",url:""}] },
  { tier:"21–30 · To Slot", name:"", comp:"", photo:"", note:"", clips:[{label:"",url:""},{label:"",url:""}] },
  { tier:"21–30 · To Slot", name:"", comp:"", photo:"", note:"", clips:[{label:"",url:""},{label:"",url:""}] }
];

/* ---------- render engine (no need to edit below) ---------- */
const esc = s => (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function embed(url){
  const u=(url||"").trim(); if(!u) return null;
  let m;
  if((m=u.match(/youtu\.be\/([\w-]+)/))||(m=u.match(/youtube\.com\/watch\?v=([\w-]+)/))||(m=u.match(/youtube\.com\/embed\/([\w-]+)/)))
    return `<iframe src="https://www.youtube.com/embed/${m[1]}" allowfullscreen loading="lazy"></iframe>`;
  if((m=u.match(/vimeo\.com\/(?:video\/)?(\d+)/)))
    return `<iframe src="https://player.vimeo.com/video/${m[1]}" allowfullscreen loading="lazy"></iframe>`;
  if(/\.mp4($|\?)/i.test(u)) return `<video src="${esc(u)}" controls preload="metadata"></video>`;
  return `<iframe src="${esc(u)}" allowfullscreen loading="lazy"></iframe>`;
}

function clipHTML(c){
  const frame = embed(c.url);
  const capEmpty = !c.label;
  const cap = `<div class="cap ${c.type==='down'?'down':''}"><span class="dot"></span>${
      capEmpty ? '<span class="empty">add a caption</span>' : esc(c.label)}</div>`;
  if(frame) return `<div class="clip"><div class="frame">${frame}</div>${cap}</div>`;
  return `<div class="clip empty"><div class="frame"><span class="plus">+ add clip</span></div>${cap}</div>`;
}

function cardHTML(p, rank){
  const blank = !p.name;
  const hero = p.photo
    ? `<figure class="hero"><img src="${esc(p.photo)}" alt="${esc(p.name)}"></figure>`
    : `<figure class="hero"><div class="ph"><span class="big">${rank}</span><span>add photo →<br><code>photo:"images/...jpg"</code></span></div></figure>`;
  const name = blank
    ? `<div class="name"><span class="num">${rank}.</span> <span class="todo">Add player</span></div>`
    : `<div class="name"><span class="num">${rank}.</span> ${esc(p.name)}</div>`;
  const comp = `<div class="comp"><b>Comp</b>${p.comp?esc(p.comp):'<span class="empty">add a comp</span>'}</div>`;
  const note = p.note?`<p class="note">${esc(p.note)}</p>`:``;
  const clips = (p.clips&&p.clips.length?p.clips:[{label:"",url:""},{label:"",url:""}]).map(clipHTML).join("");
  return `<article class="card ${blank?'blank':''}">
    <span class="rankchip">#${rank}</span>
    ${hero}
    <div class="info">${name}${comp}${note}<div class="clips">${clips}</div></div>
  </article>`;
}

function render(){
  const root=document.getElementById('board');
  let html="", lastTier=null, side=false;
  PLAYERS.forEach((p,i)=>{
    if(p.tier!==lastTier){
      lastTier=p.tier; side=!side;
      html+=`<div class="tier"><span class="bar"></span><h2><span>›</span> ${esc(p.tier)}</h2><span class="bar r"></span></div>`;
    }
    html+=cardHTML(p, i+1);
  });
  root.innerHTML=html;
}
render();
</script>
</body>
</html>
