<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2023 Big Board — Guiseppe Drafts</title>
<style>
  @font-face{
    font-family:'Base Mono';
    src:url('base-mono.otf') format('opentype');
    font-weight:400 900; font-style:normal; font-display:swap;
  }
  :root{
    --ink:#0a0a0a; --paper:#ffffff; --muted:#666; --faint:#9a9a9a;
    --line:#e6e6e6; --rule:#0a0a0a; --accent:#e8552b;
    --mono:'Base Mono', ui-monospace, 'Cascadia Mono', 'Roboto Mono', Consolas, monospace;
    --sans:Arial, Helvetica, 'Liberation Sans', sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.5}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1060px;margin:0 auto;padding:0 22px}

  header.site{padding:34px 0 22px;border-bottom:1px solid var(--line);text-align:center}
  .brand{font-family:var(--sans);font-weight:700;font-size:22px;letter-spacing:.01em}
  .brand .tld{font-size:11px;font-weight:400;color:var(--faint);letter-spacing:.04em;margin-left:2px}
  .nav{margin-top:8px;font-size:12px;letter-spacing:.16em;color:var(--faint);text-transform:uppercase}
  .nav a{margin:0 10px}
  h1.title{font-family:var(--mono);font-weight:700;line-height:.98;letter-spacing:.01em;
    text-transform:uppercase;font-size:clamp(38px,8vw,74px);margin:30px 0 4px;text-align:left}
  .subtitle{font-family:var(--sans);color:var(--muted);font-size:14px;text-align:left;letter-spacing:.02em}
  .subtitle b{color:var(--ink)}
  main.wrap{position:relative}
  .revtable{position:absolute;top:4px;right:22px;width:262px;border:1.5px solid var(--ink);background:var(--paper);font-family:var(--sans);font-size:11px;line-height:1.3;z-index:5}
  .revtable .rt-h{border-bottom:1.5px solid var(--ink);padding:4px 8px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
  .revtable table{border-collapse:collapse;width:100%}
  .revtable td{border-top:1px solid var(--line);padding:4px 8px;vertical-align:top;color:var(--ink)}
  .revtable td.n{color:#d0021b;font-weight:700;width:30px;border-right:1px solid var(--line);text-align:center}
  .revtable td.d{width:58px;color:var(--muted);white-space:nowrap;border-left:1px solid var(--line)}
  .rev{color:#d0021b}
  .revcloud{position:absolute;pointer-events:none;overflow:visible;z-index:3}
  .revdelta{position:absolute;font-family:var(--sans);font-weight:700;font-size:13px;color:#d0021b;z-index:4;pointer-events:none;line-height:1}
  @media (max-width:880px){ .revtable{position:static;width:auto;right:auto;margin:0 0 18px} }

  .tier-group{display:flex;align-items:center;gap:0;margin:52px 0}
  .tier-frame{flex:1 1 auto;min-width:0;border:3px solid var(--rule);border-radius:20px;padding:10px 24px 6px}
  .tier-frame .player:last-child{border-bottom:none;padding-bottom:18px}
  .tier-flag{flex:0 0 236px;display:flex;align-items:center}
  .tier-flag .lead{flex:0 0 30px;height:3px;background:var(--rule)}
  .tier-flag .flag-box{flex:1;border:3px solid var(--rule);border-radius:14px;padding:12px 15px;background:var(--paper)}
  .tier-flag .num{display:block;font-family:var(--mono);font-weight:700;text-transform:uppercase;letter-spacing:.13em;font-size:18px;line-height:1}
  .tier-flag .desc{display:block;margin-top:7px;font-family:var(--sans);font-size:13px;color:var(--muted);line-height:1.35}
  .tier-flag .desc.todo{color:var(--faint)}
  @media (max-width:860px){
    .tier-group{flex-direction:column;align-items:stretch}
    .tier-flag{flex-basis:auto;order:-1;margin-bottom:14px}
    .tier-flag .lead{display:none}
  }

  .player{padding:6px 0 40px;border-bottom:1px solid var(--line)}
  .hero{margin:0;position:relative;background:#f4f4f4;aspect-ratio:3/2;overflow:hidden}
  .hero img{width:100%;height:100%;object-fit:cover;display:block}
  .hero.fit{background:#fff}
  .hero .ph{position:absolute;inset:0;border:1.5px dashed #cfcfcf;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:6px;color:var(--faint);text-align:center;font-size:13px;padding:12px}
  .hero .ph .big{font-family:var(--mono);font-weight:700;font-size:40px;color:#dcdcdc;line-height:1}
  .hero .ph code{background:#ececec;color:#777;padding:1px 6px;border-radius:3px;font-size:12px}
  .rankchip{position:absolute;top:0;left:0;z-index:2;font-family:var(--mono);font-weight:700;font-size:15px;
    background:var(--ink);color:#fff;padding:5px 10px;letter-spacing:.04em}

  .name{font-family:var(--sans);font-weight:700;font-size:clamp(22px,3.4vw,30px);letter-spacing:-.01em;
    margin:16px 0 6px;line-height:1.1}
  .name .num{font-family:var(--mono);color:var(--accent)}
  .name .todo{color:var(--faint)}
  .comp{font-family:var(--sans);font-size:15px;color:var(--ink);margin:0 0 4px}
  .comp .lab{font-family:var(--mono);font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-right:6px}
  .comp .empty{color:var(--faint)}
  .note{font-family:var(--sans);color:#333;font-size:15px;margin:8px 0 16px;max-width:64ch}

  .clips{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:14px}
  .clip{display:flex;flex-direction:column}
  .clip .frame{aspect-ratio:16/9;background:#0b0b0b;position:relative;overflow:hidden}
  .clip .frame iframe,.clip .frame video{position:absolute;inset:0;width:100%;height:100%;border:0;object-fit:contain}
  .clip.empty .frame{border:1.5px dashed #cfcfcf;display:flex;align-items:center;justify-content:center}
  .clip.empty .frame .play{width:44px;height:44px;border-radius:50%;border:2px solid #c7c7c7;position:relative}
  .clip.empty .frame .play::after{content:"";position:absolute;left:17px;top:13px;border-style:solid;
    border-width:8px 0 8px 13px;border-color:transparent transparent transparent #c7c7c7}
  .clip .cap{padding:8px 2px 0;font-size:13px;color:#333;display:flex;gap:7px;align-items:center;min-height:26px}
  .clip .cap .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex:0 0 auto}
  .clip .cap.down .dot{background:#d33}
  .clip .cap .empty{color:var(--faint)}

  .backhome{display:inline-block;margin:34px 0 0;font-family:var(--mono);font-size:13px;text-transform:uppercase;
    letter-spacing:.1em;color:var(--muted)}
  footer.site{border-top:1px solid var(--line);margin-top:20px;padding:24px 0 60px;text-align:center;
    color:var(--faint);font-size:12px;font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase}
  @media (max-width:560px){ .clips{grid-template-columns:1fr} }

  /* ---- data branch door ---- */
  .databranch{display:block;position:relative;margin:14px 0 8px;border:2px solid #d0021b;border-radius:12px;
    padding:13px 16px;background:#fff;text-decoration:none;color:var(--ink);max-width:60ch;transition:background .15s,box-shadow .15s}
  .databranch:hover{background:#fff5f5;box-shadow:0 3px 14px rgba(208,2,27,.12)}
  .databranch .db-k{display:block;font-family:var(--mono);font-weight:700;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#d0021b}
  .databranch .db-t{display:block;font-size:13.5px;color:#333;margin:5px 0 8px;line-height:1.4}
  .databranch .db-go{display:block;font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.04em}
</style>
</head>
<body>
  <header class="site">
    <div class="wrap">
      <div class="brand"><a href="./">Guiseppe Drafts</a><span class="tld">.net</span></div>
      <div class="nav"><a href="./">NBA Draft</a><a href="contact.html">Contact</a></div>
    </div>
  </header>

  <main class="wrap">
    <aside class="revtable" aria-label="Revision schedule">
      <div class="rt-h">Revisions</div>
      <table>
        <tr><td class="n">△1</td><td>Highlight videos added</td><td class="d">Jul 2026</td></tr>
        <tr><td class="n">△2</td><td>Jarace Walker &mdash; data branch added</td><td class="d">Jul 2026</td></tr>
      </table>
    </aside>
    <h1 class="title">2023 NBA<br>Draft<br>Big Board</h1>
    <div class="subtitle"><b>Big G's Big Board</b> &nbsp;·&nbsp; 2023 class &nbsp;·&nbsp; the Wembanyama year</div>
    <div id="board"></div>
    <a class="backhome" href="./">&larr; Back to home</a>
  </main>

  <footer class="site"><div class="wrap">Guiseppe Drafts — Big G's Big Board 2023</div></footer>

<script>
/* ================================================================
   EDIT THE BOARD HERE — same rules as the other boards.
   Colours in my notes = tiers.  Add a photo → photo:"name.jpg".
   ================================================================ */

const PLAYERS = [
  { tier:"The GOAT", name:"Victor Wembanyama", comp:"Ralph Sampson that wants to be KD", photo:"wemby.jpg",
    note:"GOAT.", clipRev:1, clips:[{label:"Pushing the ball up the court",url:"wemby-push.mp4"},{label:"Initiating offence from the 3pt line",url:"wemby-offence.mp4"}] },

  { tier:"Top of the Draft", name:"Scoot Henderson", comp:"Russell Westbrook (better attitude)", photo:"scoot.jpg", noClips:true,
    note:"All intangibles — got that dawg in him, an insane athlete, and he'll be mean." },
  { tier:"Top of the Draft", name:"Jarace Walker", comp:"Andrei Kirilenko", photo:"jarace.jpg", noClips:true,
    note:"Mean — high in the defensive analytics, and he can shoot (kinda)!", branch:"jarace", branchRev:2 },

  { tier:"NBA Players", name:"Brandon Miller", comp:"Jabari Smith skills / MPJ brain", photo:"bmiller.jpg", noClips:true, note:"" },
  { tier:"NBA Players", name:"Amen Thompson", comp:"Jalen Green (speculative)", photo:"amen.jpg", noClips:true, note:"" },
  { tier:"NBA Players", name:"Cason Wallace", comp:"Tony Allen with an okay shot", photo:"cason.jpg", noClips:true,
    note:"Jarace is taller, which is why he's in front — but same sort of impact." },
  { tier:"NBA Players", name:"Anthony Black", comp:"", photo:"black.jpg", noClips:true, note:"Looks high-motor." },
  { tier:"NBA Players", name:"Cam Whitmore", comp:"", photo:"whitmore.jpg", noClips:true,
    note:"Man amongst boys — but doesn't really have the intangibles I'm looking for." },
  { tier:"NBA Players", name:"Kobe Bufkin", comp:"", photo:"bufkin.jpg", noClips:true, note:"Looks good — higher potential than Lively." },
  { tier:"NBA Players", name:"Dereck Lively II", comp:"", photo:"lively.jpg", noClips:true, note:"Will have a job because of his shot-blocking. He's good." },

  { tier:"Probably G-League", name:"Ausar Thompson", comp:"", photo:"ausar.jpg", noClips:true, note:"Bumped up to 11 — ahead of GG." },
  { tier:"Probably G-League", name:"GG Jackson", comp:"", photo:"gg.jpg", fit:"contain", noClips:true, note:"Legit — but personality concerns." },
  { tier:"Probably G-League", name:"Nick Smith Jr.", comp:"", photo:"nicksmith.jpg", noClips:true, note:"Looks pretty good." },
  { tier:"Probably G-League", name:"Taylor Hendricks", comp:"", photo:"hendricks.jpg", fit:"contain", noClips:true, note:"Looks okay, I guess." },
  { tier:"Probably G-League", name:"Leonard Miller", comp:"", photo:"lmiller.jpg", noClips:true, note:"Looks unique offensively — no defence." },
  { tier:"Probably G-League", name:"Bilal Coulibaly", comp:"", photo:"bilal.jpg", noClips:true, note:"High upside." },
  { tier:"Probably G-League", name:"Keyonte George", comp:"", photo:"keyonte.jpg", noClips:true, note:"Good shooter — high upside." },
  { tier:"Probably G-League", name:"Sidy Cissoko", comp:"", photo:"sidy.jpg", noClips:true, note:"" },
  { tier:"Probably G-League", name:"Dariq Whitehead", comp:"", photo:"whitehead.jpg", noClips:true, note:"Looks okay — injury concerns." },
  { tier:"Probably G-League", name:"Gradey Dick", comp:"Duncan Robinson (peak)", photo:"dick.jpg", noClips:true,
    note:"Mean shooter — can't defend. Absolute peak is Duncan Robinson." },
  { tier:"Probably G-League", name:"Kris Murray", comp:"", photo:"krismurray.jpg", noClips:true,
    note:"Could be an okay role player — a touch more than the others; probably should be higher." },
  { tier:"Probably G-League", name:"Maxence Prosper", comp:"", photo:"prosper.jpg", noClips:true, note:"Potential okay role player." },
  { tier:"Probably G-League", name:"Brice Sensabaugh", comp:"Michael Redd", photo:"sensabaugh.jpg", noClips:true, note:"Potential okay role player." },
  { tier:"Probably G-League", name:"Jalen Hood-Schifino", comp:"", photo:"hoodschifino.jpg", noClips:true, note:"" },
  { tier:"Probably G-League", name:"Kobe Brown", comp:"", photo:"kobebrown.jpg", noClips:true, note:"" },
  { tier:"Probably G-League", name:"Maxwell Lewis", comp:"", photo:"maxwell.jpg", noClips:true, note:"" },
  { tier:"Probably G-League", name:"Rayan Rupert", comp:"", photo:"rupert.jpg", noClips:true, note:"" }
];

const esc = s => (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function embed(url){
  const u=(url||"").trim(); if(!u) return null; let m;
  if((m=u.match(/youtu\.be\/([\w-]+)/))||(m=u.match(/youtube\.com\/watch\?v=([\w-]+)/))||(m=u.match(/youtube\.com\/embed\/([\w-]+)/)))
    return `<iframe src="https://www.youtube.com/embed/${m[1]}" allowfullscreen loading="lazy"></iframe>`;
  if((m=u.match(/vimeo\.com\/(?:video\/)?(\d+)/)))
    return `<iframe src="https://player.vimeo.com/video/${m[1]}" allowfullscreen loading="lazy"></iframe>`;
  if(/\.mp4($|\?)/i.test(u)) return `<video src="${esc(u)}" controls preload="metadata"></video>`;
  return `<iframe src="${esc(u)}" allowfullscreen loading="lazy"></iframe>`;
}
function clipHTML(c){
  const frame = embed(c.url);
  const cap = `<div class="cap ${c.type==='down'?'down':''}"><span class="dot"></span>${
      c.label ? esc(c.label) : '<span class="empty">add a caption</span>'}</div>`;
  if(frame) return `<div class="clip"><div class="frame">${frame}</div>${cap}</div>`;
  return `<div class="clip empty"><div class="frame"><span class="play"></span></div>${cap}</div>`;
}
function playerHTML(p, rank){
  const blank = !p.name;
  const hero = p.photo
    ? `<figure class="hero${p.fit==='contain'?' fit':''}"><span class="rankchip">#${rank}</span><img src="${esc(p.photo)}" alt="${esc(p.name)}"${p.fit?` style="object-fit:${esc(p.fit)}"`:``}></figure>`
    : `<figure class="hero"><span class="rankchip">#${rank}</span><div class="ph"><span class="big">${rank}</span><span>add photo → <code>photo:"name.jpg"</code></span></div></figure>`;
  const name = blank
    ? `<div class="name"><span class="num">${rank}.</span> <span class="todo">Add player</span></div>`
    : `<div class="name"><span class="num">${rank}.</span> ${esc(p.name)}</div>`;
  const comp = p.comp?`<div class="comp"><span class="lab">Realistic Comp</span>${esc(p.comp)}</div>`:``;
  const note = p.note?`<p class="note">${esc(p.note)}</p>`:``;
  const branch = p.branch?`<a class="databranch" href="#branch" data-branch="${esc(p.branch)}"${p.branchRev?` data-rev="${esc(String(p.branchRev))}"`:``}><span class="db-k">&#9635; The Data Branch</span><span class="db-t">Jarace Walker by the numbers &mdash; and the two-way forwards he could become.</span><span class="db-go">Open the data view &rarr;</span></a>`:``;
  const clipsHTML = p.noClips ? `` : `<div class="clips"${p.clipRev?` data-rev="${p.clipRev}"`:``}>${(p.clips&&p.clips.length?p.clips:[{label:"",url:""},{label:"",url:""}]).map(clipHTML).join("")}</div>`;
  return `<article class="player">${hero}${name}${comp}${note}${branch}${clipsHTML}</article>`;
}
const TIERS = {
  "The GOAT":"The clear #1 — a generational talent.",
  "Top of the Draft":"Rounding out a top-3-heavy class.",
  "NBA Players":"Through Lively — these guys should stick in the league.",
  "Probably G-League":"From here down, likely G-League. Not a deep draft — not sure many outside the top 10 are in the NBA in 3 years."
};
function render(){
  const root=document.getElementById('board');
  const groups=[]; let cur=null;
  PLAYERS.forEach((p,i)=>{
    if(!cur||cur.tier!==p.tier){ cur={tier:p.tier, items:[]}; groups.push(cur); }
    cur.items.push({p, rank:i+1});
  });
  root.innerHTML = groups.map(g=>{
    const cards = g.items.map(it=>playerHTML(it.p, it.rank)).join("");
    const d = TIERS[g.tier];
    const desc = d ? `<span class="desc">${esc(d)}</span>` : `<span class="desc todo">add a tier description</span>`;
    return `<div class="tier-group"><div class="tier-frame">${cards}</div><div class="tier-flag"><span class="lead"></span><div class="flag-box"><span class="num">${esc(g.tier)}</span>${desc}</div></div></div>`;
  }).join("");
}
function revCloudPath(w,h,r){
  function edge(x0,y0,x1,y1){var L=Math.hypot(x1-x0,y1-y0);if(L<1){return"";}var n=Math.max(1,Math.round(L/(2*r))),s=L/n,ux=(x1-x0)/L,uy=(y1-y0)/L,p="";for(var i=1;i<=n;i++){var ex=x0+ux*s*i,ey=y0+uy*s*i;p+="A"+(s/2).toFixed(2)+" "+(s/2).toFixed(2)+" 0 0 1 "+ex.toFixed(2)+" "+ey.toFixed(2)+" ";}return p;}
  function corner(x0,y0,x1,y1){var rr=(Math.hypot(x1-x0,y1-y0)/2).toFixed(2);return "A"+rr+" "+rr+" 0 0 1 "+x1.toFixed(2)+" "+y1.toFixed(2)+" ";}
  var c=r;
  return "M "+c+" 0 "+edge(c,0,w-c,0)+corner(w-c,0,w,c)+edge(w,c,w,h-c)+corner(w,h-c,w-c,h)+edge(w-c,h,c,h)+corner(c,h,0,h-c)+edge(0,h-c,0,c)+corner(0,c,c,0)+"Z";
}
function drawClouds(){
  document.querySelectorAll(".clips[data-rev]").forEach(function(el){
    el.querySelectorAll(".revcloud").forEach(function(x){x.remove();});
    el.style.position="relative";
    var w=el.offsetWidth,h=el.offsetHeight; if(!w||!h){return;}
    var padL=44,padR=36,padT=12,padB=46;
    var frame=el.closest(".tier-frame");
    if(frame){var cr=el.getBoundingClientRect(),fr=frame.getBoundingClientRect();padL=Math.max(24,(cr.left-fr.left)+20);padR=Math.max(24,(fr.right-cr.right)+16);padB=Math.max(24,(fr.bottom-cr.bottom)+18);}
    var r=16,W=w+padL+padR,H=h+padT+padB,num=el.getAttribute("data-rev");
    var dx=W+14,dy=-32;
    var g='<path d="'+revCloudPath(W-4,H-4,r)+'" transform="translate(2,2)" fill="none" stroke="#d0021b" stroke-width="1.6" stroke-opacity=".8" stroke-linejoin="round"/>';
    g+='<line x1="'+(W-r-14)+'" y1="10" x2="'+dx+'" y2="'+(dy+13)+'" stroke="#d0021b" stroke-width="1.2" stroke-opacity=".8"/>';
    g+='<path d="M'+dx+' '+(dy-12)+'L'+(dx-13)+' '+(dy+12)+'L'+(dx+13)+' '+(dy+12)+'Z" fill="none" stroke="#d0021b" stroke-width="1.4" stroke-opacity=".8" stroke-linejoin="round"/>';
    g+='<text x="'+dx+'" y="'+(dy+8)+'" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700" fill="#d0021b" fill-opacity=".9">'+num+'</text>';
    var wrp=document.createElement("div");
    wrp.innerHTML='<svg class="revcloud" width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" style="left:'+(-padL)+'px;top:'+(-padT)+'px;overflow:visible">'+g+'</svg>';
    el.appendChild(wrp.firstChild);
  });
}
function drawDoorClouds(){
  document.querySelectorAll(".databranch[data-rev]").forEach(function(el){
    el.querySelectorAll(".revcloud").forEach(function(x){x.remove();});
    el.style.position="relative";
    var w=el.offsetWidth,h=el.offsetHeight; if(!w||!h){return;}
    var padL=40,padR=40,padT=14,padB=16,r=15;
    var W=w+padL+padR,H=h+padT+padB,num=el.getAttribute("data-rev");
    var dx=W+14,dy=-30;
    var g='<path d="'+revCloudPath(W-4,H-4,r)+'" transform="translate(2,2)" fill="none" stroke="#d0021b" stroke-width="1.6" stroke-opacity=".8" stroke-linejoin="round"/>';
    g+='<line x1="'+(W-r-14)+'" y1="10" x2="'+dx+'" y2="'+(dy+13)+'" stroke="#d0021b" stroke-width="1.2" stroke-opacity=".8"/>';
    g+='<path d="M'+dx+' '+(dy-12)+'L'+(dx-13)+' '+(dy+12)+'L'+(dx+13)+' '+(dy+12)+'Z" fill="none" stroke="#d0021b" stroke-width="1.4" stroke-opacity=".8" stroke-linejoin="round"/>';
    g+='<text x="'+dx+'" y="'+(dy+8)+'" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700" fill="#d0021b" fill-opacity=".9">'+num+'</text>';
    var wrp=document.createElement("div");
    wrp.innerHTML='<svg class="revcloud" width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" style="left:'+(-padL)+'px;top:'+(-padT)+'px;overflow:visible">'+g+'</svg>';
    el.appendChild(wrp.firstChild);
  });
}
function drawAllClouds(){drawClouds();drawDoorClouds();}
render();
setTimeout(drawAllClouds,60);
addEventListener("load",drawAllClouds);
addEventListener("resize",function(){clearTimeout(window._rc);window._rc=setTimeout(drawAllClouds,150);});
</script>
<script src="branch-panel.js?v=10" defer></script>
</body>
</html>
