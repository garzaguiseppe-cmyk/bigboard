<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2025 Big Board — Guiseppe Drafts</title>
<style>
  @font-face{
    font-family:'Base Mono';
    src:url('base-mono.otf') format('opentype');
    font-weight:400 900; font-style:normal; font-display:swap;
  }
  :root{
    --ink:#0a0a0a; --paper:#ffffff; --muted:#666; --faint:#9a9a9a;
    --line:#e6e6e6; --rule:#0a0a0a; --accent:#e8552b;
    --mono:'Base Mono', ui-monospace, 'Cascadia Mono', 'Roboto Mono', Consolas, monospace;
    --sans:Arial, Helvetica, 'Liberation Sans', sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.5}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1060px;margin:0 auto;padding:0 22px}
  header.site{padding:34px 0 22px;border-bottom:1px solid var(--line);text-align:center}
  .brand{font-weight:700;font-size:22px}
  .brand .tld{font-size:11px;font-weight:400;color:var(--faint);letter-spacing:.04em;margin-left:2px}
  .note{font-family:var(--sans);color:#333;font-size:15px;margin:8px 0 16px;max-width:64ch}
  .nav{margin-top:8px;font-size:12px;letter-spacing:.16em;color:var(--faint);text-transform:uppercase}
  .nav a{margin:0 10px}
  h1.title{font-family:var(--mono);font-weight:700;line-height:.98;letter-spacing:.01em;
    text-transform:uppercase;font-size:clamp(38px,8vw,74px);margin:30px 0 4px;text-align:left}
  .subtitle{color:var(--muted);font-size:14px;text-align:left;letter-spacing:.02em}
  .subtitle b{color:var(--ink)}
  .tier-group{display:flex;align-items:center;gap:0;margin:52px 0}
  .tier-frame{flex:1 1 auto;min-width:0;border:3px solid var(--rule);border-radius:20px;padding:10px 24px 6px}
  .tier-frame .player:last-child{border-bottom:none;padding-bottom:18px}
  .tier-flag{flex:0 0 236px;display:flex;align-items:center}
  .tier-flag .lead{flex:0 0 30px;height:3px;background:var(--rule)}
  .tier-flag .flag-box{flex:1;border:3px solid var(--rule);border-radius:14px;padding:12px 15px;background:var(--paper)}
  .tier-flag .num{display:block;font-family:var(--mono);font-weight:700;text-transform:uppercase;letter-spacing:.13em;font-size:18px;line-height:1}
  .tier-flag .desc{display:block;margin-top:7px;font-family:var(--sans);font-size:13px;color:var(--muted);line-height:1.35}
  .tier-flag .desc.todo{color:var(--faint)}
  @media (max-width:860px){
    .tier-group{flex-direction:column;align-items:stretch}
    .tier-flag{flex-basis:auto;order:-1;margin-bottom:14px}
    .tier-flag .lead{display:none}
  }
  .player{padding:6px 0 40px;border-bottom:1px solid var(--line)}
  .hero{margin:0;position:relative;background:#f4f4f4;aspect-ratio:3/2;overflow:hidden}
  .hero img{width:100%;height:100%;object-fit:cover;display:block}
  .hero .ph{position:absolute;inset:0;border:1.5px dashed #cfcfcf;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:6px;color:var(--faint);text-align:center;font-size:13px;padding:12px}
  .hero .ph .big{font-family:var(--mono);font-weight:700;font-size:40px;color:#dcdcdc;line-height:1}
  .hero .ph code{background:#ececec;color:#777;padding:1px 6px;border-radius:3px;font-size:12px}
  .rankchip{position:absolute;top:0;left:0;z-index:2;font-family:var(--mono);font-weight:700;font-size:15px;
    background:var(--ink);color:#fff;padding:5px 10px;letter-spacing:.04em}
  .name{font-weight:700;font-size:clamp(22px,3.4vw,30px);letter-spacing:-.01em;margin:16px 0 6px;line-height:1.1}
  .name .num{font-family:var(--mono);color:var(--accent)}
  .name .todo{color:var(--faint)}
  .comp{font-size:15px;color:var(--ink);margin:0 0 4px}
  .comp .lab{font-family:var(--mono);font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-right:6px}
  .comp .empty{color:var(--faint)}
  .clips{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:14px}
  .clip{display:flex;flex-direction:column}
  .clip .frame{aspect-ratio:16/9;background:#f0f0f0;position:relative;overflow:hidden}
  .clip .frame iframe,.clip .frame video{position:absolute;inset:0;width:100%;height:100%;border:0}
  .clip.empty .frame{border:1.5px dashed #cfcfcf;display:flex;align-items:center;justify-content:center}
  .clip.empty .frame .play{width:44px;height:44px;border-radius:50%;border:2px solid #c7c7c7;position:relative}
  .clip.empty .frame .play::after{content:"";position:absolute;left:17px;top:13px;border-style:solid;
    border-width:8px 0 8px 13px;border-color:transparent transparent transparent #c7c7c7}
  .clip .cap{padding:8px 2px 0;font-size:13px;color:#333;display:flex;gap:7px;align-items:center;min-height:26px}
  .clip .cap .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex:0 0 auto}
  .clip .cap .empty{color:var(--faint)}
  .backhome{display:inline-block;margin:34px 0 0;font-family:var(--mono);font-size:13px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
  footer.site{border-top:1px solid var(--line);margin-top:20px;padding:24px 0 60px;text-align:center;
    color:var(--faint);font-size:12px;font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase}
  @media (max-width:560px){ .clips{grid-template-columns:1fr} }
</style>
</head>
<body>
  <header class="site">
    <div class="wrap">
      <div class="brand"><a href="./">Guiseppe Drafts</a><span class="tld">.net</span></div>
      <div class="nav"><a href="./">NBA Draft</a><a href="contact.html">Contact</a></div>
    </div>
  </header>
  <main class="wrap">
    <h1 class="title">2025 NBA<br>Draft<br>Big Board</h1>
    <div class="subtitle"><b>Big G's Big Board</b> &nbsp;·&nbsp; 2025 class &nbsp;·&nbsp; top of the board</div>
    <div id="board"></div>
    <a class="backhome" href="./">&larr; Back to home</a>
  </main>
  <footer class="site"><div class="wrap">Guiseppe Drafts — Big G's Big Board 2025</div></footer>

<script>
/* 2025 board — 30 blank slots. Fill each: name, comp, photo, clips.
   Same rules as the 2024 board. Add a tier by setting the "tier" text. */
const PLAYERS = [
  { tier:"Generational", name:"Cooper Flagg", comp:"Larry Bird (with defence)", photo:"cooper.jpg", note:"", clips:[{label:"",url:""},{label:"",url:""}] },
  { tier:"Inseparable", name:"Dylan Harper", comp:"Jalen Brunson", photo:"", note:"", clips:[{label:"",url:""},{label:"",url:""}] },
  { tier:"Inseparable", name:"VJ Edgecombe", comp:"", photo:"vj.jpg", note:"", clips:[{label:"",url:""},{label:"",url:""}] },
  { tier:"The Rest", name:"Collin Murray-Boyles", comp:"", photo:"", note:"", clips:[{label:"",url:""},{label:"",url:""}] },
  { tier:"The Rest", name:"Khaman Maluach", comp:"", photo:"", note:"", clips:[{label:"",url:""},{label:"",url:""}] },
  { tier:"The Rest", name:"Egor Demin", comp:"", photo:"", note:"", clips:[{label:"",url:""},{label:"",url:""}] },
  { tier:"The Rest", name:"Cedric Coward", comp:"", photo:"", note:"", clips:[{label:"",url:""},{label:"",url:""}] }
];

const esc = s => (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function embed(url){
  const u=(url||"").trim(); if(!u) return null; let m;
  if((m=u.match(/youtu\.be\/([\w-]+)/))||(m=u.match(/youtube\.com\/watch\?v=([\w-]+)/))||(m=u.match(/youtube\.com\/embed\/([\w-]+)/)))
    return `<iframe src="https://www.youtube.com/embed/${m[1]}" allowfullscreen loading="lazy"></iframe>`;
  if((m=u.match(/vimeo\.com\/(?:video\/)?(\d+)/)))
    return `<iframe src="https://player.vimeo.com/video/${m[1]}" allowfullscreen loading="lazy"></iframe>`;
  if(/\.mp4($|\?)/i.test(u)) return `<video src="${esc(u)}" controls preload="metadata"></video>`;
  return `<iframe src="${esc(u)}" allowfullscreen loading="lazy"></iframe>`;
}
function clipHTML(c){
  const frame = embed(c.url);
  const cap = `<div class="cap"><span class="dot"></span>${c.label?esc(c.label):'<span class="empty">add a caption</span>'}</div>`;
  if(frame) return `<div class="clip"><div class="frame">${frame}</div>${cap}</div>`;
  return `<div class="clip empty"><div class="frame"><span class="play"></span></div>${cap}</div>`;
}
function playerHTML(p, rank){
  const blank = !p.name;
  const hero = p.photo
    ? `<figure class="hero"><span class="rankchip">#${rank}</span><img src="${esc(p.photo)}" alt="${esc(p.name)}"></figure>`
    : `<figure class="hero"><span class="rankchip">#${rank}</span><div class="ph"><span class="big">${rank}</span><span>add photo → <code>photo:"images/…jpg"</code></span></div></figure>`;
  const name = blank
    ? `<div class="name"><span class="num">${rank}.</span> <span class="todo">Add player</span></div>`
    : `<div class="name"><span class="num">${rank}.</span> ${esc(p.name)}</div>`;
  const comp = `<div class="comp"><span class="lab">Realistic Comp</span>${p.comp?esc(p.comp):'<span class="empty">add a comp</span>'}</div>`;
  const note = p.note?`<p class="note">${esc(p.note)}</p>`:``;
  const clips = (p.clips&&p.clips.length?p.clips:[{label:"",url:""},{label:"",url:""}]).map(clipHTML).join("");
  return `<article class="player">${hero}${name}${comp}${note}<div class="clips">${clips}</div></article>`;
}
const TIERS = {
  "Generational":"Larry Bird with defence.",
  "Inseparable":"Inseparable — but well below Cooper.",
  "The Rest":"Didn't really spend much time on these fellas."
};
function render(){
  const root=document.getElementById('board');
  const groups=[]; let cur=null;
  PLAYERS.forEach((p,i)=>{
    if(!cur||cur.tier!==p.tier){ cur={tier:p.tier, items:[]}; groups.push(cur); }
    cur.items.push({p, rank:i+1});
  });
  root.innerHTML = groups.map(g=>{
    const cards = g.items.map(it=>playerHTML(it.p, it.rank)).join("");
    const d = TIERS[g.tier];
    const desc = d ? `<span class="desc">${esc(d)}</span>` : `<span class="desc todo">add a tier description</span>`;
    return `<div class="tier-group"><div class="tier-frame">${cards}</div><div class="tier-flag"><span class="lead"></span><div class="flag-box"><span class="num">${esc(g.tier)}</span>${desc}</div></div></div>`;
  }).join("");
}
render();
</script>
</body>
</html>
